# 秘密情報スキャン（gitleaks）
# .github/workflows/secret-scan.yml に配置
# マネーフォワード事例のような「うっかりコミット」を防ぐ。完全無料・APIキー不要。

name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全履歴をスキャン
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
